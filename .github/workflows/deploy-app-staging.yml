name: Deploy Staging
on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  setup_env:
    uses: ./.github/workflows/setup-env.yml
    secrets: inherit
    with:
      ENVIRONMENT: staging

  deploy-app:
    needs: setup_env
    uses: ./.github/workflows/deploy-app.yml
    secrets: inherit
    with:
      ENVIRONMENT: staging
      DEPLOY_WORKFLOW_FILE: deploy-app-staging.yml

  deploy-imap-listener:
    needs: setup_env
    uses: ./.github/workflows/deploy-imap-listener.yml
    secrets: inherit
    with:
      ENVIRONMENT: staging
      DEPLOY_WORKFLOW_FILE: deploy-app-staging.yml

  services:
    needs: [deploy-app, deploy-imap-listener]
    uses: ./.github/workflows/services.yml
    secrets: inherit
    with:
      ENVIRONMENT: staging
