name: Deploy App to Ionos
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string

jobs:
  diff_app:
    uses: ./.github/workflows/diff-last-run.yml
    with:
      CHECK_DIFF_LOCATIONS: src/ db/ public/ emails/ docker/

  build_app:
    runs-on: ubuntu-latest
    needs: diff_app
    if: ${{ needs.diff_app.outputs.changes == 'true' }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: "AWS: Configure credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          file: ./docker/app/Dockerfile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ vars.ECR_REGISTRY }}/trassenscout/app:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/trassenscout/app:${{ inputs.ENVIRONMENT }}-latest
          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ inputs.ENVIRONMENT }}
            NEXT_PUBLIC_APP_ORIGIN=${{ vars.APP_ORIGIN }}

      - name: Push app image
        run: |
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
          docker push --all-tags ${{ vars.ECR_REGISTRY }}/trassenscout/app
