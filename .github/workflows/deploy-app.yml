name: Deploy App to Ionos
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string

jobs:
  diff_app:
    uses: ./.github/workflows/diff-last-run.yml
    secrets: inherit
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      CHECK_DIFF_LOCATIONS: src/ db/ public/ emails/ docker/
      ENV_FINGERPRINT_SCOPE: app

  build_app:
    runs-on: ubuntu-latest
    needs: diff_app
    if: ${{ needs.diff_app.outputs.CHANGES == 'true' }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: "AWS: Configure credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        run: aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          file: ./docker/app/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ vars.ECR_REGISTRY }}/trassenscout/app:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/trassenscout/app:${{ inputs.ENVIRONMENT }}-latest
          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ inputs.ENVIRONMENT }}
            NEXT_PUBLIC_APP_ORIGIN=${{ vars.APP_ORIGIN }}

      - name: Prepare app environment fingerprint artifact
        run: |
          mkdir -p .ci/env-fingerprints
          echo "${{ needs.diff_app.outputs.env_fingerprint_cache_key }}" > .ci/env-fingerprints/app-${{ inputs.ENVIRONMENT }}.hash
        shell: bash

      - name: Cache app environment fingerprint
        if: ${{ needs.diff_app.outputs.env_fingerprint_cache_key != '' }}
        uses: actions/cache@v4
        with:
          path: .ci/env-fingerprints
          key: ${{ needs.diff_app.outputs.env_fingerprint_cache_key }}
