name: Deploy IMAP Listener
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string

jobs:
  diff_imap:
    uses: ./.github/workflows/diff-last-run.yml
    with:
      CHECK_DIFF_LOCATIONS: imap-listener/ docker/imap-listener/

  build_imap:
    runs-on: ubuntu-latest
    needs: diff_imap
    if: ${{ needs.diff_imap.outputs.changes == 'true' }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: "AWS: Configure credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build IMAP listener image
        uses: docker/build-push-action@v6
        with:
          context: ./imap-listener
          file: ./docker/imap-listener/Dockerfile
          push: false
          load: true
          cache-from: |
            type=gha
            type=registry,ref=${{ vars.ECR_REGISTRY }}/trassenscout/imap-listener:${{ inputs.ENVIRONMENT }}-latest
          cache-to: type=gha,mode=max
          tags: |
            ${{ vars.ECR_REGISTRY }}/trassenscout/imap-listener:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/trassenscout/imap-listener:${{ inputs.ENVIRONMENT }}-latest

      - name: Push IMAP listener image
        run: |
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
          docker push --all-tags ${{ vars.ECR_REGISTRY }}/trassenscout/imap-listener
